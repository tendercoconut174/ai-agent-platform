services:

  gateway:
    dns: [8.8.8.8, 8.8.4.4]
    env_file: [.env]
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8001
      DATABASE_URL: postgresql://dev:dev@postgres:5432/agent_platform
    ports: ["8000:8000"]
    depends_on: [orchestrator, postgres]

  orchestrator:
    dns: [8.8.8.8, 8.8.4.4]
    env_file: [.env]
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    environment:
      DATABASE_URL: postgresql://dev:dev@postgres:5432/agent_platform
    ports: ["8001:8001"]
    depends_on: [postgres]

  scheduler:
    dns: [8.8.8.8, 8.8.4.4]
    env_file: [.env]
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    environment:
      DATABASE_URL: postgresql://dev:dev@postgres:5432/agent_platform
      ORCHESTRATOR_URL: http://orchestrator:8001
    command: ["uv", "run", "python", "main.py", "scheduler"]
    depends_on: [orchestrator, postgres]

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: agent_platform
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
