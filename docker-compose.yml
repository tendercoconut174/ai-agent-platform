services:

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: .
      dockerfile: services/workers/Dockerfile
    environment:
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: agent_platform
    ports:
      - "5432:5432"